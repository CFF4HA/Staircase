events {
    worker_connections 1024;
}

http {
    # Critical: This tells Nginx to use Railway's internal DNS
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # Backend Proxy
        location ~ ^/api/(.*)$ {
            # We still use a variable here to force Nginx to resolve 
            # the hostname at runtime rather than just at startup.
            set $backend "http://staircase-apibackend:8081";
            
            proxy_pass $backend/$1$is_args$args;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend Proxy
        location / {
            set $frontend "http://staircase-webfrontend:8080";
            proxy_pass $frontend;
        }
    }
}
