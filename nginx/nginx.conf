server {
    listen 80;
    resolver 127.0.0.11 valid=30s;

    location ~ ^/api/(.*)$ {
        set $backend "${BACKEND_URL}";
        proxy_pass $backend/$1$is_args$args;
        proxy_set_header Host $host;
        # ... other headers
    }

    location / {
        set $frontend "${FRONTEND_URL}";
        proxy_pass $frontend;
    }
}
