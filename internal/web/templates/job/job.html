{{ define "card-job" }}
<div class="modal-header">
  <h5 class="modal-title text-secondary">{{ .Source.Name }}</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body">
  <h5>Job Information!</h5>
  <p class="text-muted">
    The following is all the information we have on your job!
  </p>

  {{ if .Job.Metadata }}

  {{ else }}
    <p class="text-muted text-center">Sorry, there's no data here yet.</p>
  {{ end }}

  <button class="btn btn-danger" onclick="JobDelete()">Delete</button>
</div>
<input type="hidden" id="job-id" value="{{.Job.ID}}">
</div>


<script>
  function GetJobInfo() {
    var ds = {
      id: document.getElementById("job-id").value,
    }

    return ds;
  }

  async function JobDelete() {
    var ds = GetJobInfo();

    const response = await fetch("/api/job", {
      method: "DELETE",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(ds),
    });

    if (response.ok) {
      // Close the modal

      // Optionally, you can also refresh the datasource list or perform other actions here
    } else {
      console.error("Failed to delete datasource");
    }
  }

</script>
{{ end }}
{{ template "card-job" . }}
