{{ define "form-user_login" }}
<div class="card p-3" style="width: 28rem;"
  hx-get="/htmx/form/success"
  hx-trigger="login-success from:body"
  hx-target="this"
  hx-swap="outerHTML"
>
  <div class="form-header">
    <h3>Login</h3>
  </div>

  <div class="mb-3">
    <label>Username</label>
    <input type="text" class="form-control" name="form-user-login_username" placeholder="Enter username">
  </div>
  <div class="mb-3">
    <label>Password</label>
    <input type="password" class="form-control" name="form-user-login_password" placeholder="Enter password">
  </div>

  <div class="">
    <button onclick="PostLoginFormData()" type="submit" class="btn btn-dark">Submit</button>
  </div>
</div>

<script>
  function GetLoginFormData() {
    var user = {
      username: document.getElementsByName("form-user-login_username")[0].value,
      password: document.getElementsByName("form-user-login_password")[0].value,
    };

    return user;
  }

  function PostLoginFormData() {
    var user = GetLoginFormData();
    fetch("/api/user", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(user)
    }).then(response => {
      if (response.ok) {
          htmx.trigger("body", "login-success");
      } else {
        console.error("Failed to log in user");
      }
    }).catch(error => {
      console.error("Error logging in user:", error);
    });
  }
</script>
{{ end }}
{{ template "form-user_login" . }}
